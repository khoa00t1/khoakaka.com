# ----------------------------------------------------------------------
# Build and deploy the Jekyll site to GitHub Pages.
# Uses the official actions for Pages so we don't need a `gh-pages` branch.
# ----------------------------------------------------------------------
name: Deploy Jekyll site to Pages

on:
    push:
        branches: ["main"]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

# Allow only one concurrent deployment, skip queued runs in between.
concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Ruby
              uses: ruby/setup-ruby@v1
              with:
                  ruby-version: "3.3"
                  bundler-cache: true
                  # Bust stale vendor/bundle cache from pre-Jekyll-3.10 resolves.
                  cache-version: 1

            - name: Setup Pages
              id: pages
              uses: actions/configure-pages@v5

            - name: Build with Jekyll
              env:
                  JEKYLL_ENV: production
              run: |
                  bundle exec jekyll build \
                      --baseurl "${{ steps.pages.outputs.base_path }}"

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
