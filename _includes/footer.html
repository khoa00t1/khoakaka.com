<footer class="site-footer" role="contentinfo">
    <div class="container site-footer__inner">
        <div class="site-footer__brand">
            <p class="site-footer__name">{{ site.title }}</p>
            <p class="site-footer__motto">{{ site.motto }}</p>
        </div>

        <div class="site-footer__cols">
            {% for col in site.data.navigation.footer %}
                <div class="site-footer__col">
                    <h4 class="site-footer__heading">{{ col.title }}</h4>
                    <ul class="site-footer__list">
                        {% for link in col.links %}
                            <li>
                                <a href="{{ link.url | relative_url }}"{% if link.external %} target="_blank" rel="noopener"{% endif %}>
                                    {{ link.title }}
                                </a>
                            </li>
                        {% endfor %}
                    </ul>
                </div>
            {% endfor %}
        </div>
    </div>

    <div class="container site-footer__legal">
        <p>&copy; {{ site.time | date: "%Y" }} {{ site.title }}. All rights reserved.</p>
    </div>
</footer>
