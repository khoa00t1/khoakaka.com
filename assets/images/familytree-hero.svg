<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="title">
    <title id="title">Clan Tree app illustration</title>
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#FCEBEF"/>
            <stop offset="100%" stop-color="#FFFFFF"/>
        </linearGradient>
        <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#FFFFFF"/>
            <stop offset="100%" stop-color="#FAFAFC"/>
        </linearGradient>
    </defs>

    <rect width="800" height="600" fill="url(#bg)"/>

    <!-- connecting lines -->
    <g stroke="#C62B48" stroke-width="3" fill="none" opacity="0.4">
        <path d="M400 180 L240 320"/>
        <path d="M400 180 L400 320"/>
        <path d="M400 180 L560 320"/>
        <path d="M240 320 L160 460"/>
        <path d="M240 320 L320 460"/>
        <path d="M560 320 L480 460"/>
        <path d="M560 320 L640 460"/>
    </g>

    <!-- root -->
    <g>
        <rect x="335" y="130" width="130" height="80" rx="14" fill="url(#card)" stroke="#C62B48" stroke-width="2"/>
        <circle cx="370" cy="170" r="18" fill="#C62B48"/>
        <rect x="395" y="156" width="55" height="8" rx="4" fill="#1F2933"/>
        <rect x="395" y="172" width="40" height="6" rx="3" fill="#7B8794"/>
    </g>

    <!-- gen 2 -->
    <g>
        <rect x="180" y="280" width="120" height="74" rx="12" fill="url(#card)" stroke="#CBD2D9" stroke-width="2"/>
        <circle cx="212" cy="316" r="16" fill="#9B1F38"/>
        <rect x="234" y="304" width="50" height="7" rx="3" fill="#1F2933"/>
        <rect x="234" y="318" width="34" height="5" rx="2" fill="#7B8794"/>
    </g>
    <g>
        <rect x="340" y="280" width="120" height="74" rx="12" fill="url(#card)" stroke="#CBD2D9" stroke-width="2"/>
        <circle cx="372" cy="316" r="16" fill="#C62B48"/>
        <rect x="394" y="304" width="50" height="7" rx="3" fill="#1F2933"/>
        <rect x="394" y="318" width="34" height="5" rx="2" fill="#7B8794"/>
    </g>
    <g>
        <rect x="500" y="280" width="120" height="74" rx="12" fill="url(#card)" stroke="#CBD2D9" stroke-width="2"/>
        <circle cx="532" cy="316" r="16" fill="#9B1F38"/>
        <rect x="554" y="304" width="50" height="7" rx="3" fill="#1F2933"/>
        <rect x="554" y="318" width="34" height="5" rx="2" fill="#7B8794"/>
    </g>

    <!-- gen 3 -->
    <g opacity="0.95">
        <rect x="100" y="430" width="110" height="62" rx="10" fill="url(#card)" stroke="#E4E7EB" stroke-width="2"/>
        <circle cx="128" cy="461" r="13" fill="#C62B48"/>
        <rect x="148" y="450" width="46" height="6" rx="3" fill="#1F2933"/>
        <rect x="148" y="462" width="30" height="5" rx="2" fill="#7B8794"/>
    </g>
    <g opacity="0.95">
        <rect x="265" y="430" width="110" height="62" rx="10" fill="url(#card)" stroke="#E4E7EB" stroke-width="2"/>
        <circle cx="293" cy="461" r="13" fill="#9B1F38"/>
        <rect x="313" y="450" width="46" height="6" rx="3" fill="#1F2933"/>
        <rect x="313" y="462" width="30" height="5" rx="2" fill="#7B8794"/>
    </g>
    <g opacity="0.95">
        <rect x="425" y="430" width="110" height="62" rx="10" fill="url(#card)" stroke="#E4E7EB" stroke-width="2"/>
        <circle cx="453" cy="461" r="13" fill="#C62B48"/>
        <rect x="473" y="450" width="46" height="6" rx="3" fill="#1F2933"/>
        <rect x="473" y="462" width="30" height="5" rx="2" fill="#7B8794"/>
    </g>
    <g opacity="0.95">
        <rect x="585" y="430" width="110" height="62" rx="10" fill="url(#card)" stroke="#E4E7EB" stroke-width="2"/>
        <circle cx="613" cy="461" r="13" fill="#9B1F38"/>
        <rect x="633" y="450" width="46" height="6" rx="3" fill="#1F2933"/>
        <rect x="633" y="462" width="30" height="5" rx="2" fill="#7B8794"/>
    </g>
</svg>
